name: Bug report
description: Report a bug in claude-video-vision
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run /watch-video ...
        2. ...
        3. ...
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - Gemini API
        - Local (Whisper)
        - OpenAI API
        - Not yet configured
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: macOS 15.1, Ubuntu 24.04, Windows 11
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v20.11.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
